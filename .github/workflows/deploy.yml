name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions mínimas necessárias.
permissions:
  contents: read

env:
  VERCEL_ORG_ID: "team_XjbwyiZfHYAWIGIugWYIkzSd"
  VERCEL_PROJECT_ID: "prj_yGGRzfAXO3nfp96QwuvdA1jWARkt"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        # `vercel deploy --prod` faz o build remoto usando vercel.json
        # (pnpm install + build dos pacotes + next build). Nenhum passo
        # manual necessário: todo push em main publica em produção.
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes --scope "$VERCEL_ORG_ID"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

