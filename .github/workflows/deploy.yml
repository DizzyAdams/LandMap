name: Deploy

# Só roda após o CI passar (production só recebe código verde).
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_ORG_ID: "team_XjbwyiZfHYAWIGIugWYIkzSd"
  VERCEL_PROJECT_ID: "prj_yGGRzfAXO3nfp96QwuvdA1jWARkt"

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Vercel auth
        # O CLI do Vercel v54 rejeita JWT passado via --token; gravar o token
        # na session store faz o CLI autenticar normalmente.
        run: |
          mkdir -p ~/.local/share/com.vercel.cli ~/.vercel
          printf '{"configurationVersion":1,"token":"%s"}' "$VERCEL_TOKEN" > ~/.local/share/com.vercel.cli/auth.json
          printf '{"configurationVersion":1,"token":"%s"}' "$VERCEL_TOKEN" > ~/.vercel/auth.json
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        # `vercel deploy --prod` faz o build remoto usando vercel.json
        # (pnpm install + build dos pacotes + next build). Nenhum passo
        # manual necessário: a cada push em main com CI verde, publica em produção.
        run: npx vercel deploy --prod --yes --scope "$VERCEL_ORG_ID"

