name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r --filter @landmap/api run build

      # Deploy step — ajuste conforme provider (Railway, Render, Fly.io, etc.)
      - name: Deploy API
        run: |
          echo "Deploy do @landmap/api pendente de configuração do provider"
