services:
  mlflow:
    build:
      context: ../..
      dockerfile: python/docker/Dockerfile
    command: uv run mlflow ui --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

  dagster:
    build:
      context: ../..
      dockerfile: python/docker/Dockerfile
    command: uv run dagster dev -m landmap_pipelines.definitions --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"

  api:
    build:
      context: ../..
      dockerfile: python/docker/Dockerfile
    command: uv run fastapi dev landmap_serving/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
