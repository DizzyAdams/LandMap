[project]
name = "landmap-data"
version = "0.1.0"
description = "Ingestion & storage layer for LandMap data science (DuckDB + Postgres)"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.0",
    "pandas>=2.2",
    "pyarrow>=17.0",
    "duckdb>=1.1",
    "pydantic>=2.8",
    "pydantic-settings>=2.4",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/landmap_data"]
