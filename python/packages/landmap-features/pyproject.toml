[project]
name = "landmap-features"
version = "0.1.0"
description = "Feature engineering for LandMap (polars)"
requires-python = ">=3.12"
dependencies = [
    "polars>=1.0",
    "landmap-data",
]

[tool.uv.sources]
landmap-data = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/landmap_features"]
