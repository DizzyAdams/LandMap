[project]
name = "landmap-pipelines"
version = "0.1.0"
description = "Dagster orchestration for LandMap data science"
requires-python = ">=3.12"
dependencies = [
    "dagster>=1.8",
    "dagster-webserver>=1.8",
    "mlflow>=2.15",
    "landmap-data",
    "landmap-features",
    "landmap-models",
]

[tool.uv.sources]
landmap-data = { workspace = true }
landmap-features = { workspace = true }
landmap-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/landmap_pipelines"]
