[project]
name = "landmap-serving"
version = "0.1.0"
description = "FastAPI valuation & forecast service for LandMap"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
    "numpy>=2.0",
    "python-multipart>=0.0.9",
    "pillow>=10.4",
    "landmap-data",
    "landmap-features",
    "landmap-models",
]

[project.optional-dependencies]
# Deep refiner engine. numpy hot path works without it; install for the
# PyTorch inference engine: `uv sync --extra torch`.
torch = ["torch>=2.2"]
vision = ["opencv-python-headless>=4.10"]

[tool.uv.sources]
landmap-data = { workspace = true }
landmap-features = { workspace = true }
landmap-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/landmap_serving"]
