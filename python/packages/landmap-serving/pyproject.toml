[project]
name = "landmap-serving"
version = "0.1.0"
description = "FastAPI valuation & forecast service for LandMap"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
    "landmap-data",
    "landmap-features",
    "landmap-models",
]

[tool.uv.sources]
landmap-data = { workspace = true }
landmap-features = { workspace = true }
landmap-models = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/landmap_serving"]
